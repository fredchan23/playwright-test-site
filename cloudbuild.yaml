steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_SUPABASE_URL=$$VITE_SUPABASE_URL \
          --build-arg VITE_SUPABASE_ANON_KEY=$$VITE_SUPABASE_ANON_KEY \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest \
          .
    secretEnv: ['VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

  - name: 'mcr.microsoft.com/playwright:v1.49.0-noble'
    entrypoint: bash
    args:
      - '-c'
      - |
        # Write env file for factories / admin client
        cat > e2e/.env.test <<EOF
        BASE_URL=https://${_SERVICE_NAME}-${_CLOUD_RUN_REGION}-run.app
        TEST_REGULAR_USER_EMAIL=$$TEST_REGULAR_USER_EMAIL
        TEST_REGULAR_USER_PASSWORD=$$TEST_REGULAR_USER_PASSWORD
        TEST_ADMIN_USER_EMAIL=$$TEST_ADMIN_USER_EMAIL
        TEST_ADMIN_USER_PASSWORD=$$TEST_ADMIN_USER_PASSWORD
        SUPABASE_URL=$$SUPABASE_URL
        SUPABASE_SERVICE_ROLE_KEY=$$SUPABASE_SERVICE_ROLE_KEY
        EOF

        npm ci
        # Skip @slow LLM-dependent tests on PR builds
        if [ "$_PR_BUILD" = "true" ]; then
          npx playwright test --grep-invert "@slow"
        else
          npx playwright test
        fi
    secretEnv:
      - 'TEST_REGULAR_USER_EMAIL'
      - 'TEST_REGULAR_USER_PASSWORD'
      - 'TEST_ADMIN_USER_EMAIL'
      - 'TEST_ADMIN_USER_PASSWORD'
      - 'SUPABASE_URL'
      - 'SUPABASE_SERVICE_ROLE_KEY'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_URL/versions/latest
      env: 'VITE_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_ANON_KEY/versions/latest
      env: 'VITE_SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/TEST_REGULAR_USER_EMAIL/versions/latest
      env: 'TEST_REGULAR_USER_EMAIL'
    - versionName: projects/$PROJECT_ID/secrets/TEST_REGULAR_USER_PASSWORD/versions/latest
      env: 'TEST_REGULAR_USER_PASSWORD'
    - versionName: projects/$PROJECT_ID/secrets/TEST_ADMIN_USER_EMAIL/versions/latest
      env: 'TEST_ADMIN_USER_EMAIL'
    - versionName: projects/$PROJECT_ID/secrets/TEST_ADMIN_USER_PASSWORD/versions/latest
      env: 'TEST_ADMIN_USER_PASSWORD'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/TEST_SUPABASE_SERVICE_ROLE_KEY/versions/latest
      env: 'SUPABASE_SERVICE_ROLE_KEY'

substitutions:
  _REGION: asia-southeast1
  _REPOSITORY: playwright-test-site
  _SERVICE_NAME: playwright-test-site
  _CLOUD_RUN_REGION: asia-southeast1
  _PR_BUILD: 'false'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'
